name: quantel

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip>=19.0

  # Build tools
  - cmake>=3.14
  - make
  - pybind11

  # C++ libraries (build and link)
  - boost
  - eigen
  - fmt
  - libint
  - armadillo
  - llvm-openmp       # OpenMP support — essential on macOS with Apple Clang

  # Linear algebra backends
  - openblas

  # Python scientific stack
  - numpy
  - scipy
  - h5py
  - pandas
  - matplotlib

  # Pip-only packages
  - pip:
    - pyscf>=2.0
    - pygnme>=1.0
    - pylibxc         # libxc bindings for pyscf DFT
