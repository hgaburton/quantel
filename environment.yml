name: quantel

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip>=19.0

  # Build tools
  - cmake>=3.14
  - make
  - pybind11

  # C++ libraries (build and link)
  - boost
  - eigen
  - fmt
  - libint
  - armadillo
  - llvm-openmp       # OpenMP support — essential on macOS with Apple Clang

  # Linear algebra backends
  - openblas

  # Python scientific stack
  - numpy
  - scipy
  - h5py
  - pandas
  - matplotlib
  - pyscf >=2.0

  # Note: pygnme must be installed separately after the environment is created:
  #   pip install --no-build-isolation git+https://github.com/hgaburton/pygnme.git

variables:
  OPENBLAS_NUM_THREADS: "1"
